name: Build & Deploy to Beget

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro
        working-directory: site
        run: npm run build

      - name: Deploy to Beget via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.htaccess'
          path: site/dist/
          remote_path: ${{ secrets.BEGET_DEPLOY_PATH }}
          remote_host: ${{ secrets.BEGET_HOST }}
          remote_user: ${{ secrets.BEGET_USER }}
          remote_key: ${{ secrets.BEGET_SSH_KEY }}
